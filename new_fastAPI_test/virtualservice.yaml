apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: apcogsys-routes
  namespace: default
spec:
  hosts:
  - "*"
  gateways:
  - apcogsys-gateway
  http:
  # ── App1 routes ────────────────────────────────────────────
  - match:
    - uri:
        prefix: /app1
    rewrite:
      uri: /                # strips /app1 → pod receives /health or /info
    route:
    - destination:
        host: app1-svc
        port:
          number: 80

  # ── App2 routes ────────────────────────────────────────────
  - match:
    - uri:
        prefix: /app2
    rewrite:
      uri: /                # strips /app2 → pod receives /health or /info
    route:
    - destination:
        host: app2-svc
        port:
          number: 80
